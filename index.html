    <style>
        :root {
            --ember-orange: #FF6B00;
            --ember-gold: #C3AF87;
            --ochre: #8B6914;
            --bg-deep: #0A0A0F;
            --bg-section: #111118;
            --text-primary: #E8E4DC;
            --text-muted: #9B958A;
            --text-bright: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cormorant Garamond', Georgia, serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        /* ── NAV (harmonized + larger title) ── */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: var(--text-bright);
            font-size: 1.85rem;           /* increased as requested */
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .nav-brand span.fire { font-size: 2.0rem; }   /* larger fire logo */
        .nav-links { 
            display: flex; 
            gap: 2.2rem; 
        }
        .nav-links a {
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.05em;
            text-transform: none;
            transition: color 0.3s;
        }
        .nav-links a:hover,
        .nav-links a.active { 
            color: var(--ember-orange); 
        }
        /* ── HERO & REST OF YOUR ORIGINAL STYLES (unchanged) ── */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8rem 2rem 4rem;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(139,105,20,0.06) 0%, transparent 50%, rgba(255,107,0,0.04) 100%);
            pointer-events: none;
        }
        .hero-content {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.4fr 1fr;
            gap: 3rem;
            align-items: center;
        }
        .hero-cover-left img {
            width: 100%;
            max-width: 340px;
            border-radius: 4px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .hero-cover-right img {
            width: 100%;
            max-width: 340px;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
        }
        .hero-text {
            text-align: center;
        }
        .hero-text h1 {
            font-size: 4.2rem;
            font-weight: 700;
            color: var(--ember-orange);
            letter-spacing: -0.03em;
            line-height: 1.0;
            margin-bottom: 0.6rem;
        }
        .hero-subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--ember-gold);
            margin-bottom: 1.8rem;
        }
        .hero-tagline {
            font-size: 1.55rem;
            font-style: italic;
            color: var(--text-primary);
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        .hero-desc {
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 2.4rem;
        }
        .btn-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
        }
        .btn-amazon {
            display: inline-block;
            background: var(--text-bright);
            color: var(--bg-deep);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 1rem 2.6rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 0.01em;
        }
        .btn-amazon:hover {
            background: var(--ember-orange);
            color: white;
            box-shadow: 0 6px 30px rgba(255,107,0,0.35);
        }
        .badge-nr1 {
            background: var(--ember-orange);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.5rem 0.9rem;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(255,107,0,0.4);
            line-height: 1.3;
            text-align: center;
            white-space: nowrap;
        }
        .hero-formats {
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.8rem;
            letter-spacing: 0.03em;
        }
        .quote-divider {
            padding: 5rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            background: var(--bg-section);
        }
        .quote-divider blockquote {
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.7rem;
            font-style: italic;
            color: var(--ember-gold);
            line-height: 1.6;
        }
