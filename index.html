<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ember | A Story of the First Builders</title>
    <meta name="description" content="Eleven thousand years ago, before kings, before writing, before the wheel, humanity built something eternal. Now available on Amazon.">
    <link rel="icon" type="image/jpeg" href="symposium favicon.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            content: [],
            theme: {
                extend: {
                    colors: {
                        ember: { orange: '#FF6B00' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Georgia', serif; }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('cover.jpg') center/cover no-repeat fixed; }
    </style>
</head>
<body class="bg-[#0A0A0F] text-white overflow-x-hidden">

    <!-- NAVBAR -->
    <nav class="border-b border-white/10 bg-black/70 backdrop-blur-md fixed w-full z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
            <a href="https://theemberbook.com" class="flex items-center gap-3">
                <span class="text-3xl">🔥</span>
                <span class="text-2xl font-semibold tracking-tight">The Ember</span>
            </a>
            <div class="flex gap-8 text-sm">
                <a href="https://theemberbook.com" class="hover:text-ember-orange transition">Home</a>
                <a href="https://theemberbook.com/discoveries" class="hover:text-ember-orange transition">Discoveries</a>
                <a href="https://virtuintelligence.com/symposium.html" class="hover:text-ember-orange transition">Symposium</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-bg min-h-screen flex items-center pt-20">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h1 class="text-6xl md:text-7xl font-semibold tracking-tighter mb-6 text-ember-orange">
                THE EMBER
            </h1>
            <div class="text-3xl text-white mb-8">NOW AVAILABLE</div>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto">
                Eleven thousand years ago, before kings, before writing, before the wheel, humanity built something eternal.
            </p>
            <a href="https://www.amazon.com/dp/B0GSCXLZMM" target="_blank"
               class="mt-10 inline-block bg-white text-black font-semibold text-xl px-12 py-6 rounded-2xl hover:bg-ember-orange hover:text-white transition">
                Buy on Amazon 📖
            </a>
        </div>
    </section>

    <!-- COVER OVERLAY (click anywhere to toggle covers) -->
    <div id="cover-overlay" onclick="toggleCovers(event)" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="max-w-4xl w-full px-6">
            <img src="cover-front.jpg" class="mx-auto shadow-2xl rounded" alt="Front Cover">
            <img src="cover-back.jpg" class="mx-auto mt-8 shadow-2xl rounded" alt="Back Cover">
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="py-12 border-t border-white/10 text-center text-gray-500 text-sm">
        <p>© 2026 Herb Schreib • HumanSide Technologies</p>
        <p class="mt-2">Built in conversation with Claude & Grok</p>
    </footer>

    <script>
        function toggleCovers(e) {
            if (e.target.tagName === 'A') return;
            const overlay = document.getElementById('cover-overlay');
            overlay.classList.toggle('hidden');
        }
    </script>
</body>
</html>
