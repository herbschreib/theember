<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Ember — Coming Soon</title>
  <meta name="description" content="The Ember: How Ancient Minds Encoded Knowledge to Survive the End of Their World — by Herb Schreib. Coming soon."/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
                  url('/cover.jpg') center/cover no-repeat fixed;
      color: #e0e0e0;
      line-height: 1.6;
      min-height: 100vh;
      padding-top: 14rem;          /* Aggressive top padding on body for breathing room */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      cursor: pointer;
    }
    .container {
      max-width: 900px;
      padding: 4rem 2rem 8rem;     /* Additional internal top/bottom space */
      pointer-events: none;
    }
    h1 {
      font-size: 5.5rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      color: #ff8c00;
      text-shadow: 0 0 30px rgba(255,140,0,0.7);
      margin-bottom: 1.5rem;
    }
    .coming-soon {
      font-size: 2.8rem;
      font-weight: bold;
      color: #ff8c00;
      margin: 2rem 0;
      text-transform: uppercase;
      letter-spacing: 0.3em;
    }
    .subtitle {
      font-size: 1.7rem;
      margin: 1rem 0 2rem;
      max-width: 800px;
      opacity: 0.95;
    }
    .author {
      font-size: 1.8rem;
      margin: 1.5rem 0 2.5rem;
      font-style: italic;
      opacity: 0.9;
    }
    .contact {
      font-size: 1.4rem;
      margin-top: 3rem;
      pointer-events: auto;
    }
    a {
      color: #ff8c00;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,140,0,0.4);
    }
    a:hover { color: #ffd700; border-bottom-color: #ffd700; }
    footer {
      margin-top: auto;
      padding: 2rem 0;
      font-size: 0.95rem;
      opacity: 0.6;
      border-top: 1px solid #222;
      width: 100%;
      text-align: center;
    }

    /* Overlay - scrollable with top padding */
    #cover-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: flex-start;
      justify-content: flex-start;
      flex-direction: column;
      cursor: pointer;
      overflow-y: auto;           /* Scroll if content overflows */
      padding: 10rem 2rem 6rem;   /* Top padding for overlay content */
    }
    .covers-container {
      max-width: 95%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    .cover-image {
      max-width: 45%;
      height: auto;
      border: 2px solid #444;
      box-shadow: 0 0 30px rgba(255,140,0,0.3);
      border-radius: 8px;
    }
    .close-text {
      margin: 3rem auto 1rem;
      font-size: 1.2rem;
      opacity: 0.8;
      text-align: center;
      pointer-events: none;
    }
    @media (max-width: 900px) {
      .covers-container { flex-direction: column; align-items: center; }
      .cover-image { max-width: 90%; }
      h1 { font-size: 4rem; }
      .coming-soon { font-size: 2.2rem; }
      body { padding-top: 10rem; }
      .container { padding: 6rem 1.5rem 6rem; }
      #cover-overlay { padding: 8rem 1.5rem 6rem; }
    }
  </style>
</head>
<body onclick="toggleCovers(event)">

  <div class="container">
    <h1>THE EMBER</h1>
    <div class="coming-soon">COMING SOON</div>
    <p class="subtitle">
      How Ancient Minds Encoded Knowledge<br>
      to Survive the End of Their World
    </p>
    <p class="author">by Herb Schreib</p>
    <p class="contact">
      For details, early access, or inquiries:<br>
      <a href="mailto:herb@schreib.net">herb@schreib.net</a>
    </p>
  </div>

  <!-- Overlay with front + back covers -->
  <div id="cover-overlay" onclick="toggleCovers(event)">
    <div class="covers-container">
      <img src="/cover-front.jpg" alt="Front Cover" class="cover-image">
      <img src="/cover-back.jpg" alt="Back Cover" class="cover-image">
    </div>
    <p class="close-text">Click anywhere to close</p>
  </div>

  <footer>
    © 2026 Herb Schreib — All rights reserved
  </footer>

  <script>
    function toggleCovers(e) {
      if (e.target.tagName === 'A' || e.target.closest('a')) return;
      const overlay = document.getElementById('cover-overlay');
      overlay.style.display = overlay.style.display === 'flex' ? 'none' : 'flex';
    }
  </script>

</body>
</html>
