<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="/cover.jpg" type="image/jpeg">
  <title>The Ember — Coming Soon</title>
  <meta name="description" content="The Ember: How Ancient Minds Encoded Knowledge to Survive the End of Their World — by Herb Schreib. Coming soon."/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Georgia', serif;
      background: #0a0a0a;
      color: #e0e0e0;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .hero {
      flex: 1;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)),
              url('/cover.jpg') center/cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .content {
      max-width: 800px;
      padding: 0 1.5rem;
    }
    h1 {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      color: #ff8c00; /* warm ember orange */
      text-shadow: 0 0 20px rgba(255,140,0,0.6);
    }
    .subtitle {
      font-size: 1.6rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    .coming-soon {
      font-size: 2.8rem;
      font-weight: bold;
      color: #ff8c00;
      margin: 2rem 0;
      text-transform: uppercase;
      letter-spacing: 0.3em;
    }
    .contact {
      font-size: 1.3rem;
      margin-top: 3rem;
    }
    a {
      color: #ff8c00;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,140,0,0.4);
      transition: all 0.3s;
    }
    a:hover {
      color: #ffd700;
      border-bottom-color: #ffd700;
    }
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      opacity: 0.6;
      border-top: 1px solid #222;
    }
    @media (max-width: 768px) {
      h1 { font-size: 3.2rem; }
      .coming-soon { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="content">
      <h1>THE EMBER</h1>
      <div class="coming-soon">Coming Soon</div>
      <p class="subtitle">
        How Ancient Minds Encoded Knowledge to Survive the End of Their World
      </p>
      <p class="contact">
        For details, early access, or inquiries:<br>
        <a href="mailto:herb@schreib.net">herb@schreib.net</a>
      </p>
    </div>
  </section>

  <footer>
    &copy; 2026 Herb Schreib — All rights reserved
  </footer>
</body>
</html>
