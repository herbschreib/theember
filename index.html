<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>The Ember — Coming Soon</title>

  <meta name="description"
        content="The Ember: How Ancient Minds Encoded Knowledge to Survive the End of Their World — by Herb Schreib. Coming soon." />

  <style>
    /* --------------------
       RESET
    -------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* --------------------
       PAGE BASE
    -------------------- */
    body {
      font-family: Georgia, serif;
      color: #e0e0e0;
      line-height: 1.6;
      min-height: 100svh;
      overflow-x: hidden;
      background:
        linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
        url('cover.jpg') center / cover no-repeat fixed;
      cursor: pointer;
    }

    body.modal-open {
      overflow: hidden;
    }

    /* --------------------
       HERO LAYOUT
    -------------------- */
    .hero {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 6rem;
      padding-bottom: 6rem;
      text-align: center;
    }

    .container {
      max-width: 900px;
      padding: 2rem;
    }

    /* --------------------
       TYPOGRAPHY
    -------------------- */
    h1 {
      font-size: 5.5rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      color: #ff8c00;
      text-shadow: 0 0 30px rgba(255,140,0,0.7);
      margin-bottom: 1.5rem;
    }

    .coming-soon {
      font-size: 2.8rem;
      font-weight: bold;
      color: #ff8c00;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin: 2rem 0;
    }

    .subtitle {
      font-size: 1.7rem;
      margin: 1rem auto 2rem;
      max-width: 800px;
      opacity: 0.95;
    }

    .author {
      font-size: 1.8rem;
      margin: 1.5rem 0 2.5rem;
      font-style: italic;
      opacity: 0.9;
    }

    .contact {
      font-size: 1.4rem;
      margin-top: 3rem;
    }

    a {
      color: #ff8c00;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,140,0,0.4);
    }

    a:hover {
      color: #ffd700;
      border-bottom-color: #ffd700;
    }

    /* --------------------
       FOOTER
    -------------------- */
    footer {
      text-align: center;
      padding: 2rem 0;
      font-size: 0.95rem;
      opacity: 0.6;
      border-top: 1px solid #222;
      cursor: default;
    }

    /* --------------------
       OVERLAY
    -------------------- */
    #cover-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: pointer;
    }

    #cover-overlay[aria-hidden="false"] {
      display: flex;
    }

    .covers-container {
      max-width: 95%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .cover-image {
      max-width: 45%;
      height: auto;
      border: 2px solid #444;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(255,140,0,0.3);
    }

    .close-text {
      margin-top: 1.5rem;
      font-size: 1.2rem;
      opacity: 0.8;
      cursor: default;
    }

    .close-button {
      margin-top: 1rem;
      padding: 0.8rem 1.5rem;
      background: rgba(255,140,0,0.2);
      border: 1px solid #ff8c00;
      color: #ff8c00;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .close-button:hover {
      background: rgba(255,140,0,0.4);
    }

    /* --------------------
       RESPONSIVE
    -------------------- */
    @media (max-width: 900px) {
      h1 {
        font-size: 4rem;
      }

      .coming-soon {
        font-size: 2.2rem;
      }

      .covers-container {
        flex-direction: column;
        align-items: center;
      }

      .cover-image {
        max-width: 80%;
      }
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1>THE EMBER</h1>

      <div class="coming-soon">COMING SOON</div>

      <p class="subtitle">
        How Ancient Minds Encoded Knowledge<br>
        to Survive the End of Their World
      </p>

      <p class="author">by Herb Schreib</p>

      <p class="contact">
        For details, early access, or inquiries:<br>
        <a href="mailto:herb@schreib.net">herb@schreib.net</a>
      </p>
    </div>
  </section>

  <!-- OVERLAY -->
  <div id="cover-overlay"
       role="dialog"
       aria-modal="true"
       aria-hidden="true">
    <div class="covers-container">
      <img src="cover-front.jpg" alt="The Ember — Front Cover" class="cover-image">
      <img src="cover-back.jpg" alt="The Ember — Back Cover" class="cover-image">
    </div>

    <p class="close-text">herb@schreib.net</p>

    <button class="close-button" type="button">Close</button>
  </div>

  <footer>
    © 2026 Herb Schreib — All rights reserved
  </footer>

  <script>
    const overlay = document.getElementById('cover-overlay');
    const closeBtn = overlay.querySelector('.close-button');

    function openOverlay() {
      overlay.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
      closeBtn.focus();
    }

    function closeOverlay() {
      overlay.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');
    }

    function isInteractive(el) {
      return el.closest('a, button');
    }

    document.body.addEventListener('click', (e) => {
      if (isInteractive(e.target)) return;
      const open = overlay.getAttribute('aria-hidden') === 'false';
      open ? closeOverlay() : openOverlay();
    });

    overlay.addEventListener('click', (e) => {
      if (isInteractive(e.target)) return;
      closeOverlay();
    });

    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      closeOverlay();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' &&
          overlay.getAttribute('aria-hidden') === 'false') {
        closeOverlay();
      }
    });
  </script>

</body>
</html>
